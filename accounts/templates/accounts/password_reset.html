{% extends "Quizzes/base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-lg p-4" style="max-width: 420px; width: 100%; border-radius: 16px;">
    <div class="text-center mb-4">
      <h3 class="text-primary font-weight-bold">Reset Your Password</h3>
      <p class="text-muted mb-0">Enter your email to receive a reset link</p>
    </div>

    <form method="POST">
      {% csrf_token %}
      <div class="form-group mb-4">
        {{ form.email.label_tag }}
        {{ form.email }}
      </div>
      <button type="submit" class="btn btn-primary btn-block py-2 font-weight-bold w-100" style="border-radius: 10px;">
        Send Reset Link
      </button>
    </form>

    <div class="text-center mt-3">
      <small><a href="{% url 'login' %}" class="text-primary font-weight-semibold">Back to login</a></small>
    </div>
  </div>
</div>
{% endblock %}
