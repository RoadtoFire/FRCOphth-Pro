{% extends "Quizzes/base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="container my-5">
  <div class="card shadow-sm p-4" style="max-width:500px; margin:0 auto;">
    <h3 class="fw-bold mb-4">Set a new password</h3>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary w-100 mt-3">Set Password</button>
    </form>
  </div>
</div>
{% endblock %}
