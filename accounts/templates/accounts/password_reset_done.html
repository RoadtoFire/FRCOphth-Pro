{% extends "Quizzes/base.html" %}
{% block title %}Check Your Email{% endblock %}
{% block content %}
<div class="container my-5 text-center">
  <div class="card shadow-sm p-5" style="max-width:500px; margin:0 auto;">
    <i class="fas fa-envelope fa-3x text-primary mb-3"></i>
    <h3 class="fw-bold">Check your email</h3>
    <p class="text-muted mt-2">
      If an account exists for that email address, we've sent a reset link.
      Check your spam folder if you don't see it within a few minutes.
    </p>
    <a href="/" class="btn btn-outline-primary mt-3">Back to Home</a>
  </div>
</div>
{% endblock %}
