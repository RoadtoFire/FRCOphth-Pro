{% extends "Quizzes/base.html" %}
{% block title %}Quiz Complete — {{ quiz.title }}{% endblock %}

{% block content %}
<div class="container" style="max-width:900px; margin:2rem auto;">
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
      <strong>Quiz Complete</strong>
      <span>{{ quiz.title }}</span>
    </div>
    <div class="card-body text-center py-5">
      <h3 class="fw-bold text-success mb-3">Your Results</h3>
      <p class="lead mb-1">Score: <strong>{{ total_correct }}</strong> / {{ total_attempted }}</p>
      <p class="fs-4 mb-4">Percentage: <strong>{{ percentage }}%</strong></p>

      <a class="btn btn-primary btn-lg me-3"
         href="{% url 'Quizzes:select_questions' quiz.id %}?refresh=1">
         🔁 Try the Quiz Again
      </a>
      <a class="btn btn-outline-secondary btn-lg" href="{% url 'Quizzes:home' %}">
         🏠 Back to Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
